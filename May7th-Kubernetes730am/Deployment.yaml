apiVersion: apps/v1 # API version for the Deployment resource
kind: Deployment # The Kubernetes object kind
metadata: # Metadata about this Deployment
  name: nginx-deployment # Name used to identify this Deployment
spec: # Desired state specification for the Deployment
  replicas: 3 # Number of pod replicas to run
  selector: # Selector used to identify pods managed by this Deployment
    matchLabels:
      app: nginx # Match pods with label app=nginx
  template: # Pod template for creating pods
    metadata:
      labels:
        app: nginx # Labels assigned to pods created from this template
    spec:
      containers: # List of containers to run in each pod
      - name: nginx-container # Name of the container inside the pod
        image: nginx:latest # Container image to deploy
        ports:
        - containerPort: 80 # Port exposed by the container